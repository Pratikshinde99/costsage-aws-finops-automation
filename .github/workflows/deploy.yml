name: CostSage CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: "SAM config environment (dev or prod)"
        required: true
        default: "prod"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r costsage/requirements.txt -r requirements-dev.txt
          pip install ruff

      - name: Lint
        run: ruff check costsage tests

      - name: Test
        env:
          PYTHONPATH: .
        run: pytest -q

  sam-build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM Validate
        run: sam validate --lint --template-file template.yaml

      - name: SAM Build
        run: sam build --template-file template.yaml --cached

  deploy:
    runs-on: ubuntu-latest
    needs: [quality, sam-build]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build
        run: sam build --template-file template.yaml --cached

      - name: Deploy
        run: sam deploy --config-env ${{ github.event.inputs.environment }} --no-confirm-changeset --no-fail-on-empty-changeset
